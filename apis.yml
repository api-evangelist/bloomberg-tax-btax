aid: bloomberg-tax-btax
name: Bloomberg Tax (BTAX)
description: Bloomberg Tax (BTAX) is a comprehensive tax research, planning, and
  compliance platform providing tax professionals with authoritative primary sources,
  expert analysis, and practical tools. Bloomberg Tax covers federal, state, and international
  tax law and provides data APIs for integrating tax rates, regulations, and guidance
  into enterprise tax technology workflows.
